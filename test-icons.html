<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Icônes Lucide</title>
    <script src="libs/lucide.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; }
        .icon-item { text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .icon-item i { font-size: 24px; margin-bottom: 5px; display: block; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Test des Icônes Lucide - Version Offline</h1>
    
    <div id="status"></div>
    
    <div class="icon-grid">
        <div class="icon-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </div>
        <div class="icon-item">
            <i data-lucide="package"></i>
            <span>Package</span>
        </div>
        <div class="icon-item">
            <i data-lucide="shopping-cart"></i>
            <span>Cart</span>
        </div>
        <div class="icon-item">
            <i data-lucide="credit-card"></i>
            <span>Credit</span>
        </div>
        <div class="icon-item">
            <i data-lucide="receipt"></i>
            <span>Receipt</span>
        </div>
        <div class="icon-item">
            <i data-lucide="history"></i>
            <span>History</span>
        </div>
        <div class="icon-item">
            <i data-lucide="file-text"></i>
            <span>File</span>
        </div>
        <div class="icon-item">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </div>
        <div class="icon-item">
            <i data-lucide="menu"></i>
            <span>Menu</span>
        </div>
        <div class="icon-item">
            <i data-lucide="refresh-cw"></i>
            <span>Refresh</span>
        </div>
        <div class="icon-item">
            <i data-lucide="download"></i>
            <span>Download</span>
        </div>
        <div class="icon-item">
            <i data-lucide="user-cog"></i>
            <span>User Cog</span>
        </div>
    </div>

    <script>
        function testLucideIcons() {
            const statusDiv = document.getElementById('status');
            
            try {
                // Vérifier si Lucide est chargé
                if (typeof lucide === 'undefined') {
                    statusDiv.innerHTML = '<div class="error">❌ Lucide n\'est pas chargé</div>';
                    return;
                }
                
                statusDiv.innerHTML = '<div class="success">✅ Lucide est chargé</div>';
                
                // Initialiser les icônes
                if (lucide.createIcons) {
                    lucide.createIcons();
                    statusDiv.innerHTML += '<div class="success">✅ Icônes initialisées avec succès</div>';
                } else {
                    statusDiv.innerHTML += '<div class="error">❌ createIcons n\'est pas disponible</div>';
                }
                
                // Vérifier si les icônes sont visibles
                setTimeout(() => {
                    const icons = document.querySelectorAll('i[data-lucide]');
                    let visibleCount = 0;
                    
                    icons.forEach(icon => {
                        if (icon.querySelector('svg')) {
                            visibleCount++;
                        }
                    });
                    
                    if (visibleCount === icons.length) {
                        statusDiv.innerHTML += `<div class="success">✅ Toutes les icônes (${visibleCount}) sont visibles</div>`;
                    } else {
                        statusDiv.innerHTML += `<div class="error">❌ Seulement ${visibleCount}/${icons.length} icônes sont visibles</div>`;
                    }
                }, 1000);
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">❌ Erreur: ${error.message}</div>`;
                console.error('Erreur Lucide:', error);
            }
        }
        
        // Lancer le test au chargement
        window.onload = testLucideIcons;
    </script>
</body>
</html>
